name: Load and Stress Tests

on:
  push:
    branches: [main, test/load-stress-testing]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  contract-load-tests:
    name: Contract Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contract/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run Contract Load Tests
        run: cargo test --release --manifest-path contract/Cargo.toml load_tests -- --nocapture
      
      - name: Upload Contract Load Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-load-test-results
          path: contract/target/release/

  frontend-load-tests:
    name: Frontend Load Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      
      - name: Install Frontend Dependencies
        run: npm --prefix frontend ci
      
      - name: Start Frontend Dev Server
        run: |
          npm --prefix frontend run dev &
          sleep 10
      
      - name: Run Basic Load Test
        run: k6 run --quiet --summary-export=basic-results.json frontend/tests/load/basic.js
        continue-on-error: true
      
      - name: Run Game Flow Load Test
        run: k6 run --quiet --summary-export=game-flow-results.json frontend/tests/load/game-flow.js
        continue-on-error: true
      
      - name: Run Stress Test
        run: k6 run --quiet --summary-export=stress-results.json frontend/tests/load/stress.js
        continue-on-error: true
      
      - name: Upload Load Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-load-test-results
          path: |
            basic-results.json
            game-flow-results.json
            stress-results.json
            load-test-results.json
            game-flow-results.json
            stress-test-results.json
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## Load Test Results\n\n';
            
            try {
              const basic = JSON.parse(fs.readFileSync('basic-results.json', 'utf8'));
              comment += '### Basic Load Test\n';
              comment += `- Total Requests: ${basic.metrics.http_reqs?.values?.count || 0}\n`;
              comment += `- Error Rate: ${((basic.metrics.errors?.values?.rate || 0) * 100).toFixed(2)}%\n`;
              comment += `- P95 Latency: ${(basic.metrics.http_req_duration?.values['p(95)'] || 0).toFixed(2)}ms\n\n`;
            } catch (e) {}
            
            try {
              const gameFlow = JSON.parse(fs.readFileSync('game-flow-results.json', 'utf8'));
              comment += '### Game Flow Test\n';
              comment += `- Concurrent Games: ${gameFlow.metrics.concurrent_games?.values?.count || 0}\n`;
              comment += `- Error Rate: ${((gameFlow.metrics.errors?.values?.rate || 0) * 100).toFixed(2)}%\n`;
              comment += `- P95 Flow Duration: ${(gameFlow.metrics.game_flow_duration?.values['p(95)'] || 0).toFixed(2)}ms\n\n`;
            } catch (e) {}
            
            try {
              const stress = JSON.parse(fs.readFileSync('stress-results.json', 'utf8'));
              comment += '### Stress Test\n';
              comment += `- Peak VUs: ${stress.metrics.vus_max?.values?.max || 0}\n`;
              comment += `- Successful Games: ${stress.metrics.successful_games?.values?.count || 0}\n`;
              comment += `- Reserve Depletion Errors: ${stress.metrics.reserve_depletion_errors?.values?.count || 0}\n`;
            } catch (e) {}
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
